apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: intellidocs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: vardhanaditya04/intellidocs-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
          - configMapRef:
              name: intellidocs-config
          - secretRef:
              name: intellidocs-secrets
        # Health check - Kubernetes uses this to know if pod is ready
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 5

        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          failureThreshold: 3
          
        resources:
          requests:
            memory: "1Gi"
            cpu: "250m"
          limits:
            memory: "3Gi"
            cpu: "1000m"

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: intellidocs
spec:
  selector:
    app: backend
  ports:
  - port: 8000
    targetPort: 8000