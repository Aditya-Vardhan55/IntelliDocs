name: CD Pipeline

on:
    workflow_run:
      workflows: ["CI Pipeline"]
      types:
        - completed
      branches: [ main ]

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        if: ${{ github.event.workflow_run.conclusion == 'success' }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push backend image
              uses: docker/build-push-action@v5
              with:
                context: .
                file: docker/Dockerfile.backend
                push: true
                tags: |
                  ${{ secrets.DOCKERHUB_USERNAME }}/intellidocs-backend:latest
                  ${{ secrets.DOCKERHUB_USERNAME }}/intellidocs-backend:${{ github.sha }}
                build-args: |
                  LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
                  HF_TOKEN=${{ secrets.HF_TOKEN }}
                cache-from: type=gha
                cache-to: type=gha,mode=max

            - name: Build and push frontend image
              uses: docker/build-push-action@v5
              with:
                context: .
                file: docker/Dockerfile.frontend
                push: true
                tags: |
                  ${{ secrets.DOCKERHUB_USERNAME }}/intellidocs-frontend:latest
                  ${{ secrets.DOCKERHUB_USERNAME }}/intellidocs-frontend:${{ github.sha }}
                cache-from: type=gha
                cache-to: type=gha,mode=max

            - name: Image build summary
              run: |
                echo "Backend image: ${{secrets.DOCKERHUB_USERNAME}}/intellidocs-backend:${{github.sha}}"
                echo "Frontend image: ${{secrets.DOCKERHUB_USERNAME}}/intellidocs-frontend:${{github.sha}}"
